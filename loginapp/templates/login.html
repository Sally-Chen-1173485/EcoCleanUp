<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log In - EcoCleanUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Style created by AI -->
    <style>
      img {
        max-width: 100%;
        height: auto;
      }

      .login-top-strip {
        height: 220px;
        object-fit: cover;
      }

      @media (max-width: 576px) {
        .login-top-strip {
          height: 150px;
        }
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <!-- Header -->
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
          <a class="navbar-brand fw-bold" href="/">
            EcoCleanUp
          </a>
        </div>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="py-5">
      <div class="container">
        <div class="row justify-content-center mb-4">
          <div class="col-lg-10">
              <div id="loginStripCarousel" class="carousel slide login-strip-carousel" data-bs-interval="false" data-bs-touch="false">
                <div class="carousel-inner">
                  <div class="carousel-item active">
                    <img src="{{ url_for('static', filename='login_image.jpg') }}" class="d-block w-100 login-top-strip" alt="Login banner 1">
                  </div>
                  <div class="carousel-item">
                    <img src="{{ url_for('static', filename='image1.jpg') }}" class="d-block w-100 login-top-strip" alt="Login banner 2">
                  </div>
                  <div class="carousel-item">
                    <img src="{{ url_for('static', filename='image2.jpg') }}" class="d-block w-100 login-top-strip" alt="Login banner 3">
                  </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#loginStripCarousel" data-bs-slide="prev">
                  <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                  <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#loginStripCarousel" data-bs-slide="next">
                  <span class="carousel-control-next-icon" aria-hidden="true"></span>
                  <span class="visually-hidden">Next</span>
                </button>
              </div>
          </div>
        </div>

        <div class="row align-items-center justify-content-center">
          <div class="col-sm-auto py-3">
              <div class="bg-primary text-white border border-bottom-0 rounded-top text-center">
                  <h1 class="p-3 m-0">Member Log In</h1>
              </div>
              <div class="bg-white border container">
                  <form class="p-3" action="{{ url_for('login') }}" method="post">
                    <div class="mb-3">
                      <label for="username" class="form-label">Username</label>
                      <input type="text" class="form-control{% if username_invalid %} is-invalid{% endif %}" id="username" name="username" placeholder="Enter your username..." maxlength=20 value="{{ username }}" required>
                      <div class="invalid-feedback">Can't find your account</div>
                    </div>
                    <div class="mb-3">
                      <label for="password" class="form-label">Password</label>
                      <input type="password" class="form-control{% if password_invalid %} is-invalid{% endif %}" id="password" name="password" placeholder="Enter your password..." required>
                      <div class="invalid-feedback">Incorrect username or password</div>
                    </div>
                    <div class="text-center">
                      <button type="submit" class="btn btn-primary">Log In</button>
                    </div>
                  </form>
              </div>
              <div class="bg-white border border-top-0 rounded-bottom text-center">
                  <div class="p-2">Don't have an account? <a href="{{ url_for('signup') }}">Register</a></div>
              </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-secondary text-white text-center py-3 mt-5">
      <p class="mb-0">&copy; 2024 EcoCleanUp. Created by Sally Chen</p>
      <p class="mb-0">Student ID: 1173485</p>
    </footer>
  </body>
</html>
