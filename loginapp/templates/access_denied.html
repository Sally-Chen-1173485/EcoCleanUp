<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied - EcoCleanUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <!-- Header -->
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
          <a class="navbar-brand fw-bold" href="/">
            EcoCleanUp
          </a>
        </div>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="py-5">
      <div class="container">
        <div class="row align-items-center justify-content-center min-vh-100">
          <div class="col-md-5 col-lg-4 py-5">
              <div class="bg-danger text-white border border-bottom-0 rounded-top text-center">
                  <h1 class="p-3 m-0">Access Denied</h1>
              </div>
              <div class="bg-white border container rounded-bottom p-3">
                  Your account isn't authorised to view this page. You can return <a href="{% if session['role'] == 'Volunteers' %}{{ url_for('customer_home') }}{% elif session['role'] == 'Event Leaders' %}{{ url_for('staff_home') }}{% elif session['role'] == 'Administrators' %}{{ url_for('admin_home') }}{% endif %}">home</a>, or <a href="{{ url_for('logout') }}">log out</a> if you want to sign in with a different account.
              </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-secondary text-white text-center py-3 mt-5">
      <p class="mb-0">&copy; 2024 EcoCleanUp. Created by Sally Chen</p>
      <p class="mb-0">Student ID: 1173485</p>
    </footer>
  </body>
</html>
